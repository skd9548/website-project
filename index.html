<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Website Service</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Sandeep Web Services</h1>
      <nav>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Order</a>
      </nav>
    </header>

    <section class="hero">
      <h2>I Create Professional Websites</h2>
      <p>Order your website today</p>
      <button onclick="orderNow()">Order Now</button>
    </section>

    <section class="services">
      <h2>My Services</h2>

      <div class="card">
        <h3>Business Website</h3>
        <p>Modern business website</p>
      </div>

      <div class="card">
        <h3>Portfolio Website</h3>
        <p>Personal portfolio design</p>
      </div>

      <div class="card">
        <h3>Landing Page</h3>
        <p>High converting landing page</p>
      </div>
    </section>

    <section class="order">
      <h2>Order Your Website</h2>

      <form>
        <input type="text" placeholder="Your Name" required />
        <input type="email" placeholder="Your Email" required />
        <textarea placeholder="Website Details"></textarea>
        <button type="submit">Submit</button>
      </form>
    </section>

    <footer>
      <p>© 2026 Sandeep Web Services</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
